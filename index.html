<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tamagotchi Dino</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="description" content="Cuida de tu mascota virtual dinosaurio">
    <meta name="theme-color" content="#4CAF50">
</head>
<body>
    <div class="game-container" role="main" aria-label="Juego Tamagotchi">
        <!-- Header / Barra de Estado -->
        <header class="status-bar">
            <div class="player-info">
                <h1 id="pet-name" aria-label="Nombre de la mascota">Dino</h1>
                <span id="level-badge" class="badge" aria-live="polite">Nivel 1</span>
            </div>
            <div class="stats-summary">
                <span id="summary-hunger" class="stat-icon" title="Hambre">🍖 <span id="val-hunger">100</span>%</span>
                <span id="summary-happiness" class="stat-icon" title="Felicidad">❤️ <span id="val-happiness">100</span>%</span>
                <span id="summary-energy" class="stat-icon" title="Energía">⚡ <span id="val-energy">100</span>%</span>
            </div>
        </header>

        <!-- Área Principal de la Mascota -->
        <section class="pet-area" aria-live="polite">
            <div class="pet-sprite-container">
                <div id="pet-sprite" class="pet-sprite" aria-label="Mascota virtual">
                    <!-- El sprite se dibuja vía CSS/JS -->
                    <div class="eye left"></div>
                    <div class="eye right"></div>
                    <div class="mouth"></div>
                </div>
                <div id="sleep-indicator" class="overlay-indicator hidden" aria-hidden="true">
                    💤
                </div>
                <div id="poop-indicator" class="overlay-indicator hidden" aria-label="Suciedad">
                    💩
                </div>
            </div>
            
            <!-- Mensaje de tiempo para dormir -->
            <div id="sleep-timer-display" class="sleep-timer hidden" role="status" aria-live="assertive">
                Despierta en: <span id="time-remaining">00:00</span>
            </div>
        </section>

        <!-- Controles de Acción -->
        <section class="controls-area" role="group" aria-label="Controles de cuidado">
            <div class="action-buttons-grid">
                <button class="action-btn" data-action="feed" aria-label="Alimentar">
                    <span class="icon">🍖</span>
                    <span class="label">Comer</span>
                </button>
                <button class="action-btn" data-action="play" aria-label="Jugar">
                    <span class="icon">🎾</span>
                    <span class="label">Jugar</span>
                </button>
                <button class="action-btn" data-action="sleep" id="btn-sleep" aria-label="Dormir">
                    <span class="icon">🌙</span>
                    <span class="label">Dormir</span>
                </button>
                <button class="action-btn" data-action="wake" id="btn-wake" class="hidden" aria-label="Despertar" disabled>
                    <span class="icon">☀️</span>
                    <span class="label">Despertar</span>
                </button>
                <button class="action-btn" data-action="clean" aria-label="Limpiar">
                    <span class="icon">🧹</span>
                    <span class="label">Limpiar</span>
                </button>
                <button class="action-btn" data-action="medicine" aria-label="Curar">
                    <span class="icon">💊</span>
                    <span class="label">Curar</span>
                </button>
            </div>
        </section>

        <!-- Navegación de Pestañas -->
        <nav class="tabs-nav" role="tablist" aria-label="Menú principal">
            <button class="tab-btn active" data-tab="home" role="tab" aria-selected="true">🏠 Inicio</button>
            <button class="tab-btn" data-tab="stats" role="tab" aria-selected="false">📊 Stats</button>
            <button class="tab-btn" data-tab="shop" role="tab" aria-selected="false">🛒 Tienda</button>
            <button class="tab-btn" data-tab="achievements" role="tab" aria-selected="false">🏆 Logros</button>
        </nav>

        <!-- Contenido de Pestañas -->
        <main class="tab-content">
            <!-- Pestaña Stats Detallados -->
            <div id="tab-stats" class="tab-panel hidden" role="tabpanel">
                <h2>Estadísticas Detalladas</h2>
                <div class="stats-detailed">
                    <div class="stat-row">
                        <label>Hambre:</label>
                        <progress id="bar-hunger" value="100" max="100"></progress>
                        <span id="text-hunger">100%</span>
                    </div>
                    <div class="stat-row">
                        <label>Felicidad:</label>
                        <progress id="bar-happiness" value="100" max="100"></progress>
                        <span id="text-happiness">100%</span>
                    </div>
                    <div class="stat-row">
                        <label>Energía:</label>
                        <progress id="bar-energy" value="100" max="100"></progress>
                        <span id="text-energy">100%</span>
                    </div>
                    <div class="stat-row">
                        <label>Salud:</label>
                        <progress id="bar-health" value="100" max="100"></progress>
                        <span id="text-health">100%</span>
                    </div>
                    <div class="stat-row">
                        <label>Disciplina:</label>
                        <progress id="bar-discipline" value="50" max="100"></progress>
                        <span id="text-discipline">50%</span>
                    </div>
                </div>
                <div class="debug-info">
                    <p>Edad: <span id="age-display">0</span> días</p>
                    <p>Peso: <span id="weight-display">20</span> kg</p>
                </div>
            </div>

            <!-- Pestaña Tienda -->
            <div id="tab-shop" class="tab-panel hidden" role="tabpanel">
                <h2>Tienda de Items</h2>
                <div class="currency-display">Monedas: <span id="coin-balance">0</span> 🪙</div>
                <div id="shop-items" class="shop-grid">
                    <!-- Items generados por JS -->
                </div>
                <h2>Mis Skins</h2>
                <div id="my-skins" class="shop-grid">
                    <!-- Skins compradas -->
                </div>
            </div>

            <!-- Pestaña Logros -->
            <div id="tab-achievements" class="tab-panel hidden" role="tabpanel">
                <h2>Logros Desbloqueados</h2>
                <div id="achievements-grid" class="achievements-grid">
                    <!-- Logros generados por JS -->
                </div>
            </div>
            
            <!-- Pestaña Home (Vuelve a mostrar controles si es necesario en mobile) -->
            <div id="tab-home" class="tab-panel active" role="tabpanel">
                <div class="home-message">
                    <p>¡Cuida bien de tu Dino!</p>
                </div>
            </div>
        </main>
        
        <!-- Notificaciones Toast -->
        <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>
        
        <!-- Overlay de Celebración (Partículas) -->
        <div id="celebration-overlay" class="celebration-overlay hidden" aria-hidden="true"></div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
